apiVersion: v1
kind: Namespace
metadata:
  name: busybox-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: busybox-deploy-1
  namespace: busybox-ns
  labels:
    app: busybox-app-1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: busybox-app-1
  template:
    metadata:
      labels:
        app: busybox-app-1
      annotations:
        controller.kubernetes.io/pod-deletion-cost: "100" 
    spec:
      containers:
      - name: busybox
        image: ubuntu:22.04
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash", "-c", "while true; do echo 'hello in loop'; sleep 10;done"]