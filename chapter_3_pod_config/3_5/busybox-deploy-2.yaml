apiVersion: apps/v1
kind: Deployment
metadata:
  name: busybox-deploy-2
  namespace: busybox-ns
  labels:
    app: busybox-app-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: busybox-app-2
  template:
    metadata:
      labels:
        app: busybox-app-2
    spec:
      priorityClassName: high
      containers:
      - name: busybox
        image: ubuntu:22.04
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "5G"
        command: ["/bin/bash", "-c", "while true; do echo 'hello in loop'; sleep 10;done"]